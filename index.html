<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Lightspeed Product Importer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAFA;
    --surface: #ffffff;
    --border: #cccccc;
    --text: #1a1a1a;
    --accent: #b07878;
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }

  header {
    max-width: 820px;
    margin: 0 auto 48px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    border-bottom: 2px solid var(--text);
    padding-bottom: 20px;
  }

  .if-logo { height: 48px; width: auto; filter: brightness(0); }

  .logo-block p {
    font-size: 11px;
    color: var(--text);
    margin-top: 6px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 700;
  }

  .container { max-width: 820px; margin: 0 auto; }

  #product-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    overflow: hidden;
  }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
  }

  .card-num {
    background: #1a1a1a;
    color: #fff;
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 11px;
  }

  .card-preview { flex: 1; font-size: 14px; font-weight: 600; }
  .card-preview.empty { color: #999; font-style: italic; }

  .card-price-badge { font-weight: 700; color: var(--accent); margin-right: 10px; }

  /* Red Flash Animation */
  @keyframes flash-red-field {
    0% { border-color: #ff0000; background: #fff; }
    50% { border-color: #ff0000; background: #ffebeb; box-shadow: 0 0 10px rgba(255,0,0,0.2); }
    100% { border-color: #999; background: #fff; }
  }
  .flash-red { animation: flash-red-field 0.8s ease 2; }

  .card-duplicate {
    background: #f2f9fd; border: 1px solid #cce5fa; color: #2a6ca3;
    padding: 4px 8px; border-radius: 4px; font-size: 11px; cursor: pointer;
  }

  .card-remove {
    background: #fdf2f2; border: 1px solid #facccc; color: #a32a2a;
    padding: 4px 8px; border-radius: 4px; cursor: pointer; margin-left: 5px;
  }

  .card-body { display: none; padding: 20px; border-top: 1px solid var(--border); background: #fafafa; }
  .card-body.open { display: block; }

  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field-full { grid-column: 1 / -1; }

  label { font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 4px; display: block; }

  input, select {
    background: #fff; border: 1px solid #999; border-radius: 4px;
    padding: 10px; width: 100%; font-family: 'DM Mono'; font-size: 13px; outline: none;
  }

  .add-btn {
    width: 100%; background: #fff; border: 2px dashed #999; padding: 14px;
    font-weight: 700; cursor: pointer; margin-bottom: 20px;
  }

  .export-section { background: #fff; border: 1px solid var(--border); padding: 20px; border-radius: 4px; }

  .btn-accent { background: #1a1a1a; color: #fff; border: none; padding: 12px 20px; cursor: pointer; font-weight: 700; }
  .btn-ghost { background: transparent; border: 1px solid #999; padding: 12px 20px; margin-left: 10px; cursor: pointer; }

  #toast {
    position: fixed; bottom: 20px; right: 20px; background: #000; color: #fff;
    padding: 12px 20px; border-radius: 4px; opacity: 0; transition: 0.3s;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <div class="logo-block">
    <img src="https://www.imaginefashion.com.au/cdn/shop/files/White_Logo.png?v=1738727364&width=150" alt="Imagine Fashion" class="if-logo">
    <p>Product Importer</p>
  </div>
</header>

<div class="container">
  <div id="product-list"></div>

  <button class="add-btn" onclick="addProduct()">+ Add Product</button>

  <div class="export-section">
    <h2 style="font-family: 'Cormorant Garamond'; margin-bottom: 10px;">Export CSV</h2>
    <div style="display: flex; align-items: center; gap: 10px;">
      <button class="btn-accent" onclick="exportCSV()">Download CSV</button>
      <button class="btn-ghost" onclick="clearAll()">Clear All</button>
      <div id="counter" style="margin-left: auto; font-size: 12px; font-weight: 700;">0 products</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let products = [];
  let nextId = 1;

  const CATEGORIES = ['', 'Sample Top', 'Sample Pant', 'Sample Dress', 'Sample Skirt', 'Sample Jacket', 'Sample Knit', 'Jewellery', 'Accessories', 'Homewares', 'Belts', 'Bags', 'Scarves'];
  const BRANDS = ['', 'Accessories', 'Imagine Fashion', 'Summer 24-25', 'Winter 2025', 'Winter 2026'];

  function uid() { return Math.random().toString(36).slice(2, 10).toUpperCase(); }
  function slugify(str) { return (str || 'product').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'product'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2200); }

  function addProduct(data = null) {
    const p = {
      _id: nextId++,
      open: true,
      name: '',
      category: data ? data.category : '',
      retailPrice: data ? data.retailPrice : '',
      supplyPrice: data ? data.supplyPrice : '',
      supplierName: data ? data.supplierName : '',
      supplierCode: data ? data.supplierCode : '',
      brandName: data ? data.brandName : '',
    };
    products.push(p);
    renderList();
    document.getElementById('counter').innerHTML = `${products.length} products`;

    if (data) {
      setTimeout(() => {
        const input = document.querySelector(`[data-pid="${p._id}"] .name-input`);
        input.classList.add('flash-red');
        input.focus();
        input.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 100);
    }
  }

  function duplicateProduct(id) {
    const p = products.find(p => p._id === id);
    if (p) { addProduct({...p}); showToast("Cloned! Enter new name."); }
  }

  function removeProduct(id) {
    products = products.filter(p => p._id !== id);
    renderList();
    document.getElementById('counter').innerHTML = `${products.length} products`;
  }

  function toggleCard(id) {
    const p = products.find(p => p._id === id);
    if (p) { p.open = !p.open; renderList(); }
  }

  function updateField(id, field, value) {
    const p = products.find(p => p._id === id);
    if (p) {
      p[field] = value;
      const card = document.querySelector(`[data-pid="${id}"]`);
      if (card) {
        card.querySelector('.card-preview').textContent = p.name || 'Untitled product';
        card.querySelector('.card-preview').classList.toggle('empty', !p.name);
        card.querySelector('.card-price-badge').textContent = p.retailPrice ? `$${parseFloat(p.retailPrice).toFixed(2)}` : '';
      }
    }
  }

  function renderList() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    products.forEach((p, idx) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-pid', p._id);
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(${p._id})">
          <div class="card-num">${idx + 1}</div>
          <div class="card-preview ${!p.name ? 'empty' : ''}">${p.name || 'Untitled product'}</div>
          <div class="card-price-badge">${p.retailPrice ? '$'+parseFloat(p.retailPrice).toFixed(2) : ''}</div>
          <button class="card-duplicate" onclick="event.stopPropagation(); duplicateProduct(${p._id})">Duplicate</button>
          <button class="card-remove" onclick="event.stopPropagation(); removeProduct(${p._id})">✕</button>
        </div>
        <div class="card-body ${p.open ? 'open' : ''}">
          <div class="fields-grid">
            <div class="field field-full">
              <label>Product Name <span style="color:red">*</span></label>
              <input type="text" class="name-input" value="${p.name}" oninput="updateField(${p._id},'name',this.value)">
            </div>
            <div class="field">
              <label>Category <span style="color:red">*</span></label>
              <select onchange="updateField(${p._id},'category',this.value)">
                ${CATEGORIES.map(c => `<option value="${c}" ${p.category === c ? 'selected' : ''}>${c || '-- Select --'}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Retail Price (AUD) <span style="color:red">*</span></label>
              <input type="number" step="0.01" value="${p.retailPrice}" oninput="updateField(${p._id},'retailPrice',this.value)">
            </div>
            <div class="field">
              <label>Brand Name</label>
              <select onchange="updateField(${p._id},'brandName',this.value)">
                ${BRANDS.map(b => `<option value="${b}" ${p.brandName === b ? 'selected' : ''}>${b || '-- Select Brand --'}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Supplier Code</label>
              <input type="text" value="${p.supplierCode}" oninput="updateField(${p._id},'supplierCode',this.value)">
            </div>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function exportCSV() {
    const invalid = products.filter(p => !p.name || !p.retailPrice || !p.category);
    if (invalid.length > 0) {
      showToast("Missing required fields!");
      invalid.forEach(p => {
        const el = document.querySelector(`[data-pid="${p._id}"] .name-input`);
        if(el) { el.classList.add('flash-red'); setTimeout(() => el.classList.remove('flash-red'), 2000); }
      });
      return;
    }

    const headers = ['handle','sku','name','product_category','supply_price','retail_price','tax_name','brand_name','supplier_code','active','track_inventory','inventory_Harbour_Town_Premium_Outlets','inventory_Pacific_Fair','inventory_Southport_Showroom','inventory_Southport_Warehouse'];

    const rows = products.map(p => [
      slugify(p.name),
      uid(), // No SKU- prefix
      p.name,
      p.category,
      p.supplyPrice || '',
      p.retailPrice,
      'GST', // Tax is always GST
      p.brandName || '',
      p.supplierCode || '',
      1, // Active as 1 (numeric)
      1, // Track Inventory as 1 (no decimals)
      0, 0, 0, 0 // Locations
    ]);

    const csv = [headers, ...rows].map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `import-${Date.now()}.csv`; a.click();
  }

  function clearAll() { if(confirm("Clear all?")) { products = []; renderList(); document.getElementById('counter').innerHTML = "0 products"; } }

  addProduct();
</script>
</body>
</html>
