<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="Retina Favicon Grey.png">
<title>Imagine Fashion | Lightspeed Importer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fafafa;
    --surface: rgba(0,0,0,0.04);
    --surface2: rgba(0,0,0,0.06);
    --border: rgba(0,0,0,0.12);
    --text: #1a1a1a;
    --muted: rgba(0,0,0,0.45);
    --radius: 4px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    padding: 40px 20px;
  }

  header {
    max-width: 860px;
    margin: 0 auto 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    padding-bottom: 20px;
  }

  .if-logo { height: 52px; width: auto; display: block; }

  .header-right p {
    font-size: 11px;
    color: #6b6259;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    text-align: right;
  }

  .header-right p + p { margin-top: 3px; color: rgba(0,0,0,0.3); }

  .container { max-width: 860px; margin: 0 auto; }

  /* Config panel */
  .config-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px;
    margin-bottom: 24px;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 14px;
    align-items: end;
  }

  .config-panel .field-full { grid-column: 1 / -1; }

  .status-dot {
    display: inline-block;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #2ecc71;
    margin-right: 6px;
    box-shadow: 0 0 6px rgba(46,204,113,0.5);
  }

  .status-text { font-size: 11px; font-weight: 700; color: #27ae60; letter-spacing: 0.08em; }

  /* Template bar */
  .template-label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .template-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    flex-wrap: wrap;
  }

  .btn-temp {
    background: rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.15);
    color: #1a1a1a;
    padding: 6px 12px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    letter-spacing: 0.06em;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
    text-transform: uppercase;
  }

  .btn-temp:hover { background: rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.3); }

  /* Product list */
  #product-list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 16px;
  }

  .product-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.2s;
  }

  .product-card:focus-within { border-color: rgba(255,255,255,0.7); }

  .card-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }

  .card-num {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #ffffff;
    background: #1a1a1a;
    width: 28px; height: 28px;
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-preview {
    flex: 1;
    font-size: 13px;
    color: #1a1a1a;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    text-transform: uppercase;
    font-weight: 600;
  }

  .card-preview.empty {
    color: rgba(0,0,0,0.3);
    font-style: italic;
    font-weight: 400;
    text-transform: none;
  }

  .card-price-badge {
    font-size: 12px;
    color: rgba(0,0,0,0.5);
    font-weight: 500;
    min-width: 50px;
    text-align: right;
  }

  .btn-card {
    background: rgba(0,0,0,0.05);
    border: 1px solid rgba(0,0,0,0.15);
    color: #1a1a1a;
    padding: 5px 10px;
    font-size: 10px;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.15s;
    letter-spacing: 0.05em;
  }

  .btn-card:hover { background: rgba(0,0,0,0.1); border-color: rgba(0,0,0,0.3); }
  .btn-card.danger:hover { background: rgba(200,0,0,0.08); border-color: rgba(200,0,0,0.3); color: #c00; }

  .card-toggle {
    color: rgba(0,0,0,0.35);
    font-size: 16px;
    transition: transform 0.2s;
    flex-shrink: 0;
  }

  .card-toggle.open { transform: rotate(180deg); }

  .card-body {
    display: none;
    padding: 0 18px 20px;
    border-top: 1px solid var(--border);
    animation: slideDown 0.15s ease;
  }

  .card-body.open { display: block; }

  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .fields-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
    margin-top: 16px;
  }

  .field-full { grid-column: 1 / -1; }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  label {
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: rgba(0,0,0,0.55);
    font-weight: 600;
  }

  label .optional { color: rgba(0,0,0,0.35); font-size: 9px; text-transform: none; letter-spacing: 0; font-weight: 400; }
  label .required { color: #1a1a1a; }

  input, select {
    background: #ffffff;
    border: 1px solid rgba(0,0,0,0.15);
    border-radius: var(--radius);
    color: #1a1a1a;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 10px 12px;
    transition: border-color 0.15s, box-shadow 0.15s;
    width: 100%;
    outline: none;
  }

  input:focus, select:focus {
    border-color: rgba(0,0,0,0.4);
    box-shadow: 0 0 0 3px rgba(0,0,0,0.06);
  }

  select option { background: #ffffff; color: #1a1a1a; }
  input::placeholder { color: rgba(0,0,0,0.3); }
  input[type="number"]::-webkit-inner-spin-button { opacity: 0.4; }

  /* Stock drawer */
  .drawer-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.35);
    display: none; z-index: 1999;
  }

  .drawer-overlay.active { display: block; }

  .drawer {
    position: fixed; top: 0; right: -440px;
    width: 380px; height: 100%;
    background: #f0eeeb;
    border-left: 1px solid rgba(0,0,0,0.1);
    transition: right 0.35s cubic-bezier(0.4,0,0.2,1);
    z-index: 2000;
    padding: 36px 28px;
    display: flex;
    flex-direction: column;
  }

  .drawer.active { right: 0; }

  .drawer h3 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 600;
    color: #1a1a1a;
    letter-spacing: 0.04em;
    border-bottom: 1px solid rgba(0,0,0,0.1);
    padding-bottom: 14px;
    margin-bottom: 24px;
  }

  .drawer-fields { display: flex; flex-direction: column; gap: 16px; flex: 1; }

  .drawer-save {
    background: #1a1a1a;
    color: #ffffff;
    border: none;
    padding: 14px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: var(--radius);
    margin-top: 28px;
    transition: all 0.15s;
  }

  .drawer-save:hover { background: #333; }

  /* Add button */
  .add-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    width: 100%;
    background: rgba(0,0,0,0.03);
    border: 1px dashed rgba(0,0,0,0.2);
    border-radius: var(--radius);
    padding: 14px 18px;
    color: rgba(0,0,0,0.45);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
    letter-spacing: 0.06em;
    margin-bottom: 16px;
  }

  .add-btn:hover { border-color: rgba(0,0,0,0.4); color: #1a1a1a; background: rgba(0,0,0,0.07); }

  /* Sync section */
  .export-section {
    background: #1a1a1a;
    border: 1px solid #111;
    border-radius: var(--radius);
    padding: 22px;
    margin-top: 8px;
  }

  .export-section h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 600;
    color: #ffffff;
    letter-spacing: 0.04em;
    margin-bottom: 16px;
  }

  .export-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .btn-sync {
    background: #ffffff;
    color: #1a1a1a;
    border: none;
    padding: 12px 28px;
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
  }

  .btn-sync:hover { background: #f0f0f0; box-shadow: 0 2px 16px rgba(0,0,0,0.2); }
  .btn-sync:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

  .btn-clear {
    background: transparent;
    border: 1px solid rgba(255,100,100,0.4);
    color: rgba(255,150,150,0.9);
    padding: 12px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.08em;
    cursor: pointer;
    border-radius: var(--radius);
    transition: all 0.15s;
  }

  .btn-clear:hover { border-color: #ff8080; color: #ffb0b0; background: rgba(255,80,80,0.1); }

  .counter { font-size: 11px; color: rgba(255,255,255,0.55); margin-left: auto; letter-spacing: 0.06em; }
  .counter span { color: #ffffff; font-weight: 600; }

  /* Toast */
  #toast {
    position: fixed; bottom: 28px; right: 28px;
    background: #1a1a1a;
    color: #ffffff;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    font-weight: 700;
    padding: 12px 22px;
    border-radius: var(--radius);
    opacity: 0;
    transform: translateY(10px);
    transition: all 0.25s;
    pointer-events: none;
    z-index: 3000;
    letter-spacing: 0.05em;
  }

  #toast.show { opacity: 1; transform: translateY(0); }

  /* Shopify reminder modal */
  .modal-overlay {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.45);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 4000;
  }

  .modal-overlay.active { display: flex; }

  .modal-box {
    background: #ffffff;
    border-radius: 6px;
    padding: 40px 36px;
    max-width: 440px;
    width: 90%;
    text-align: center;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
  }

  .modal-logo {
    height: 36px;
    width: auto;
    margin-bottom: 20px;
    filter: invert(1);
  }

  .modal-box h2 {
    font-family: 'Cormorant Garamond', serif;
    font-size: 24px;
    font-weight: 600;
    color: #1a1a1a;
    margin-bottom: 12px;
  }

  .modal-box p {
    font-size: 12px;
    color: #555;
    line-height: 1.7;
    margin-bottom: 24px;
    font-family: 'DM Mono', monospace;
  }

  .modal-box p strong { color: #1a1a1a; }

  .modal-btn {
    display: block;
    background: #1a1a1a;
    color: #ffffff;
    text-decoration: none;
    padding: 13px 20px;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    border-radius: 4px;
    margin-bottom: 10px;
    transition: background 0.15s;
  }

  .modal-btn:hover { background: #333; }

  .modal-close {
    background: none;
    border: 1px solid rgba(0,0,0,0.15);
    color: rgba(0,0,0,0.45);
    padding: 11px 20px;
    width: 100%;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.15s;
  }

  .modal-close:hover { border-color: rgba(0,0,0,0.3); color: #1a1a1a; }

  @media (max-width: 600px) {
    .fields-grid { grid-template-columns: 1fr; }
    .config-panel { grid-template-columns: 1fr; }
    header { flex-direction: column; align-items: flex-start; gap: 14px; }
    .drawer { width: 100%; right: -100%; }
    .card-actions { gap: 5px; }
  }
</style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>

<div class="drawer" id="drawer">
  <h3>Stock Levels</h3>
  <div class="drawer-fields" id="drawer-content"></div>
  <button class="drawer-save" onclick="closeDrawer()">SAVE &amp; CLOSE</button>
</div>

<header>
  <img src="Imagine Fashion Logo Transp.png" class="if-logo" alt="Imagine Fashion">
  <div class="header-right">
    <p>Lightspeed X-Series</p>
    <p>Direct Product Sync</p>
  </div>
</header>

<div class="container">

  <!-- Config -->
  <div class="config-panel">
    <div class="field">
      <label>Portal Password <span class="required">*</span></label>
      <input type="password" id="portal_password" oninput="saveConfig()" placeholder="Enter portal password">
    </div>
    <div class="field" style="justify-content:flex-end; padding-bottom:2px;">
      <div><span class="status-dot"></span><span class="status-text">READY</span></div>
    </div>
  </div>

  <!-- Quick templates -->
  <div class="template-label">Quick Add</div>
  <div class="template-bar" id="templates"></div>

  <!-- Product list -->
  <div id="product-list"></div>

  <button class="add-btn" onclick="addProduct()">
    <span style="font-size:18px;line-height:1;">+</span> Add Product
  </button>

  <!-- Sync -->
  <div class="export-section">
    <h2>Sync to Lightspeed</h2>
    <div class="export-row">
      <button class="btn-sync" id="sync_btn" onclick="startSync()">SYNC PRODUCTS</button>
      <button class="btn-clear" onclick="clearAll()">CLEAR ALL</button>
      <div class="counter" id="counter"><span>0</span> products</div>
    </div>
  </div>

</div>

<!-- Shopify reminder modal -->
<div class="modal-overlay" id="shopify-modal">
  <div class="modal-box">
    <img src="Imagine Fashion Logo Transp.png" alt="Imagine Fashion" class="modal-logo">
    <h2>Don't forget Shopify!</h2>
    <p>For each product you just created, open it in Lightspeed and click the <strong>"Sell on Shopify"</strong> button to publish it to your online store.</p>
    <a href="https://imaginefashionretail.retail.lightspeed.app/products?active=true&direction=DESC&field=CREATED_AT" target="_blank" class="modal-btn">Open Recently Created Products</a>
    <button class="modal-close" onclick="document.getElementById('shopify-modal').classList.remove('active')">I've done this</button>
  </div>
</div>

<div id="toast"></div>

<script>
  let products = [];
  let nextId = 1;

  const CATEGORIES = [
    '', 'Sample Top', 'Sample Pant', 'Sample Dress', 'Sample Skirt',
    'Sample Jacket', 'Sample Knit', 'Jewellery', 'Accessories',
    'Homewares', 'Belts', 'Bags', 'Scarves'
  ];

  const BRANDS = [
    '', 'Accessories', 'All Season', 'Belts', 'Discontinued', 'Ex Display',
    'Final Clearance', 'Freight', 'Gift Card', 'Imagine Fashion',
    'Imagine Fashion Dev 1', 'Imagine Fashion Wholesale', 'Jewellery',
    'Needs Altering', 'Not specified', 'Summer 20-21', 'Summer 21-22',
    'Summer 22-23', 'Summer 23-24', 'Summer 24-25', 'Summer 25-26',
    'Summer 25-27', 'Summer 25-28', 'Summer Discontinued', 'Winter 2021',
    'Winter 2022', 'Winter 2023', 'Winter 2024', 'Winter 2025', 'Winter 2026',
    'Wrapped Gift Cards'
  ];

  const OUTLET_IDS = {
    ht: '06f24f8b-21a8-11ef-f4ca-d46876ffea7a',
    pf: '06f24f8b-21a8-11ef-f4ca-d468a998f3bc',
    ss: '06f24f8b-21fd-11ef-f4ca-d466e09040b3',
    sw: '06f24f8b-21a8-11ef-f4ca-ddeb7f9ae200'
  };

  // ---- Worker URL - paste your Cloudflare Worker URL here ----
  const WORKER_URL = 'https://lightpspeedimporter.sam-58d.workers.dev';

  // ---- Init ----
  window.onload = () => {
    document.getElementById('portal_password').value = localStorage.getItem('portal_password') || '';

    CATEGORIES.filter(c => c).forEach(cat => {
      const btn = document.createElement('button');
      btn.className = 'btn-temp';
      const label = cat.replace('Sample ', '');
      btn.textContent = '+ ' + label;
      btn.onclick = () => addProduct(cat, label + ' Sample');
      document.getElementById('templates').appendChild(btn);
    });

    addProduct();
  };

  function saveConfig() {
    localStorage.setItem('portal_password', document.getElementById('portal_password').value);  }

  // ---- Helpers ----
  function uid() {
    return Math.random().toString(36).slice(2, 10).toUpperCase();
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function updateCounter() {
    document.getElementById('counter').innerHTML = `<span>${products.length}</span> product${products.length !== 1 ? 's' : ''}`;
  }

  function esc(str) {
    return (str || '').toString()
      .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
      .replace(/</g, '&lt;').replace(/>/g, '&gt;');
  }

  // ---- Product management ----
  function addProduct(cat, name) {
    if (cat === undefined) cat = '';

    // If there's exactly one product and it's completely empty, fill it instead of adding a new one
    if (
      products.length === 1 &&
      !products[0].name &&
      !products[0].category &&
      !products[0].retailPrice &&
      (cat || name)
    ) {
      products[0].name = name || '';
      products[0].category = cat;
      renderList();
      return;
    }

    products.push({
      _id: nextId++,
      open: true,
      name: name || '',
      category: cat,
      brandName: '',
      retailPrice: '',
      supplyPrice: '',
      supplierName: '',
      supplierCode: '',
      stock: { ht: 0, pf: 0, ss: 0, sw: 0 }
    });
    renderList();
    updateCounter();
    setTimeout(() => {
      const cards = document.querySelectorAll('.product-card');
      if (cards.length) cards[cards.length - 1].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    }, 50);
  }

  function removeProduct(id) {
    products = products.filter(p => p._id !== id);
    renderList();
    updateCounter();
  }

  function duplicate(id) {
    const src = products.find(p => p._id === id);
    const copy = JSON.parse(JSON.stringify(src));
    copy._id = nextId++;
    copy.open = true;
    products.push(copy);
    renderList();
    updateCounter();
  }

  function toggleCard(id) {
    const p = products.find(p => p._id === id);
    if (p) p.open = !p.open;
    renderList();
  }

  function updateField(id, field, value) {
    const p = products.find(p => p._id === id);
    if (!p) return;
    p[field] = value;
    const card = document.querySelector(`[data-pid="${id}"]`);
    if (card) {
      const preview = card.querySelector('.card-preview');
      const badge = card.querySelector('.card-price-badge');
      preview.textContent = p.name || 'New Product';
      preview.className = 'card-preview' + (p.name ? '' : ' empty');
      badge.textContent = p.retailPrice ? `$${parseFloat(p.retailPrice).toFixed(2)}` : '';
    }
  }

  // ---- Stock drawer ----
  function openDrawer(id) {
    const p = products.find(p => p._id === id);
    document.getElementById('drawer-content').innerHTML = `
      <div class="field"><label>Harbour Town</label>
        <input type="number" value="${p.stock.ht}" oninput="updateStock(${id},'ht',this.value)"></div>
      <div class="field"><label>Pacific Fair</label>
        <input type="number" value="${p.stock.pf}" oninput="updateStock(${id},'pf',this.value)"></div>
      <div class="field"><label>Southport Showroom</label>
        <input type="number" value="${p.stock.ss}" oninput="updateStock(${id},'ss',this.value)"></div>
      <div class="field"><label>Southport Warehouse</label>
        <input type="number" value="${p.stock.sw}" oninput="updateStock(${id},'sw',this.value)"></div>
    `;
    document.getElementById('drawer').classList.add('active');
    document.getElementById('overlay').classList.add('active');
  }

  function updateStock(id, loc, val) {
    const p = products.find(p => p._id === id);
    if (p) p.stock[loc] = parseInt(val) || 0;
  }

  function closeDrawer() {
    document.getElementById('drawer').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
    renderList();
  }

  // ---- Render ----
  function renderList() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';

    products.forEach((p, idx) => {
      const total = Object.values(p.stock).reduce((a, b) => a + b, 0);
      const displayName = p.name || 'New Product';
      const isEmpty = !p.name;
      const priceLabel = p.retailPrice ? `$${parseFloat(p.retailPrice).toFixed(2)}` : '';

      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-pid', p._id);

      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(${p._id})">
          <div class="card-num">${idx + 1}</div>
          <div class="card-preview${isEmpty ? ' empty' : ''}">${esc(displayName)}</div>
          <div class="card-actions">
            <div class="card-price-badge">${priceLabel}</div>
            <button class="btn-card" onclick="event.stopPropagation(); openDrawer(${p._id})" style="${total > 0 ? 'border-color:rgba(46,204,113,0.6);color:#27ae60;background:rgba(46,204,113,0.08);' : 'border-color:rgba(200,0,0,0.3);color:#c0392b;background:rgba(200,0,0,0.06);'}">STOCK [${total}]</button>
            <button class="btn-card" onclick="event.stopPropagation(); duplicate(${p._id})">DUPLICATE</button>
            <button class="btn-card danger" onclick="event.stopPropagation(); removeProduct(${p._id})">&#x2715;</button>
          </div>
          <div class="card-toggle${p.open ? ' open' : ''}">&#x25BE;</div>
        </div>
        <div class="card-body${p.open ? ' open' : ''}">
          <div class="fields-grid">
            <div class="field field-full">
              <label>Product Name <span class="required">*</span></label>
              <input type="text" placeholder="e.g. Black Bag" value="${esc(p.name)}"
                oninput="updateField(${p._id},'name',this.value)">
            </div>
            <div class="field">
              <label>Category <span class="required">*</span></label>
              <select onchange="updateField(${p._id},'category',this.value)">
                ${CATEGORIES.map(c => `<option value="${c}"${p.category === c ? ' selected' : ''}>${c || '-- Select category --'}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Brand <span class="required">*</span></label>
              <select onchange="updateField(${p._id},'brandName',this.value)">
                ${BRANDS.map(b => `<option value="${b}"${p.brandName === b ? ' selected' : ''}>${b || '-- Select brand --'}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Retail Price (AUD) <span class="required">*</span></label>
              <input type="number" step="0.01" min="0" placeholder="0.00" value="${esc(p.retailPrice)}"
                oninput="updateField(${p._id},'retailPrice',this.value)">
            </div>
            <div class="field">
              <label>Supply Price <span class="optional">(optional)</span></label>
              <input type="number" step="0.01" min="0" placeholder="0.00" value="${esc(p.supplyPrice)}"
                oninput="updateField(${p._id},'supplyPrice',this.value)">
            </div>
            <div class="field">
              <label>Supplier Name <span class="optional">(optional)</span></label>
              <input type="text" placeholder="e.g. Fulfilment Co." value="${esc(p.supplierName)}"
                oninput="updateField(${p._id},'supplierName',this.value)">
            </div>
            <div class="field">
              <label>Supplier Code <span class="optional">(optional)</span></label>
              <input type="text" placeholder="e.g. SUP-001" value="${esc(p.supplierCode)}"
                oninput="updateField(${p._id},'supplierCode',this.value)">
            </div>
          </div>
        </div>
      `;

      list.appendChild(card);
    });
  }

  // ---- Sync via Cloudflare Worker ----
  async function startSync() {
    const password = document.getElementById('portal_password').value.trim();

    if (!password) {
      alert('Please enter the portal password first.');
      return;
    }

    const invalid = products.filter(p => !p.name || !p.retailPrice || !p.category || !p.brandName);
    if (invalid.length > 0) {
      showToast(`${invalid.length} product(s) missing required fields.`);
      return;
    }

    const btn = document.getElementById('sync_btn');
    btn.disabled = true;
    btn.textContent = 'SYNCING...';

    const tax = 'GST';
    let synced = 0;

    async function workerCall(body) {
      const res = await fetch(WORKER_URL, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'X-Portal-Password': password
        },
        body: JSON.stringify(body)
      });
      if (res.status === 401) throw new Error('Incorrect portal password.');
      const data = await res.json();
      if (!res.ok) throw new Error(data?.error || JSON.stringify(data).slice(0, 300));
      return data;
    }

    for (const p of products) {
      try {
        const suffix = String(Math.floor(1000 + Math.random() * 9000));
        const finalName = `${p.name} - ${suffix}`;
        let finalSku = '';
        for (let i = 0; i < 8; i++) finalSku += Math.floor(Math.random() * 10);

        btn.textContent = `SYNCING ${synced + 1}/${products.length}...`;

        await workerCall({
          action: 'sync_product',
          payload: {
            name: finalName,
            sku: finalSku,
            retail_price: parseFloat(p.retailPrice) || 0,
            supply_price: parseFloat(p.supplyPrice) || 0,
            tax_name: tax,
            brand_name: p.brandName || '',
            type_name: p.category || '',
            supplier_name: p.supplierName || '',
            supplier_code: p.supplierCode || '',
            inventory: [
              { outlet_id: OUTLET_IDS.ht, current_amount: Number(p.stock.ht) || 0 },
              { outlet_id: OUTLET_IDS.pf, current_amount: Number(p.stock.pf) || 0 },
              { outlet_id: OUTLET_IDS.ss, current_amount: Number(p.stock.ss) || 0 },
              { outlet_id: OUTLET_IDS.sw, current_amount: Number(p.stock.sw) || 0 }
            ]
          }
        });

        synced++;

      } catch (err) {
        console.error(err);
        btn.disabled = false;
        btn.textContent = 'SYNC PRODUCTS';
        alert(`Sync failed for "${p.name}".\n\n${err.message}`);
        return;
      }
    }

    btn.textContent = 'SYNC COMPLETE';
    showToast(`${synced} product${synced !== 1 ? 's' : ''} synced successfully!`);

    // Show Shopify reminder popup
    document.getElementById('shopify-modal').classList.add('active');

    setTimeout(() => {
      btn.textContent = 'SYNC PRODUCTS';
      btn.disabled = false;
    }, 3000);
  }

  function clearAll() {
    if (products.length === 0) return;
    if (confirm('Clear all products?')) {
      products = [];
      nextId = 1;
      renderList();
      updateCounter();
    }
  }
</script>
