<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagine Fashion | X-Series Importer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #FAFAFA; --surface: #ffffff; --border: #000000; --text: #1a1a1a; --accent: #4CAF50; --radius: 2px; --error: #ff4d4d; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; padding: 40px 20px; }
  header { max-width: 820px; margin: 0 auto 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--text); padding-bottom: 20px; }
  .if-logo { height: 65px; width: auto; }
  .container { max-width: 820px; margin: 0 auto; }
  #product-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .product-card { background: var(--surface); border: 1px solid #ccc; border-radius: var(--radius); overflow: hidden; }
  .card-header { display: flex; align-items: center; padding: 15px; cursor: pointer; background: #fff; }
  .card-num { background: #000; color: #fff; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; margin-right: 15px; }
  .card-preview { flex: 1; font-weight: 600; font-size: 14px; text-transform: uppercase; }
  
  .card-actions { display: flex; gap: 8px; align-items: center; }
  .btn-stock { background: #000; color: #fff; border: none; padding: 6px 12px; font-size: 10px; cursor: pointer; font-weight: 700; display: flex; gap: 8px; }
  .stock-badge { background: #fff; color: #000; padding: 1px 5px; border-radius: 2px; font-size: 9px; }
  
  .template-bar { display: flex; gap: 5px; margin-bottom: 15px; flex-wrap: wrap; }
  .btn-tpl { background: #f0f0f0; border: 1px solid #000; padding: 5px 10px; font-size: 9px; cursor: pointer; font-weight: 700; text-transform: uppercase; }
  .btn-tpl:hover { background: #000; color: #fff; }

  .card-body { display: none; padding: 20px; border-top: 1px solid #eee; background: #fafafa; }
  .card-body.open { display: block; }
  
  .drawer { position: fixed; top: 0; right: -450px; width: 380px; height: 100%; background: #fff; border-left: 2px solid #000; transition: 0.4s cubic-bezier(0.165, 0.84, 0.44, 1); z-index: 2000; padding: 40px 30px; box-shadow: -10px 0 30px rgba(0,0,0,0.1); }
  .drawer.active { right: 0; }
  .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 1999; backdrop-filter: blur(2px); }
  .drawer-overlay.active { display: block; }

  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .field-full { grid-column: 1 / -1; }
  label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
  input, select { border: 1px solid #000; padding: 10px; width: 100%; font-family: 'DM Mono'; font-size: 13px; background: #fff; transition: border-color 0.2s; }
  input.invalid { border-color: var(--error); background: #fff8f8; }

  .export-section { background: #000; color: #fff; padding: 25px; border-radius: 4px; }
  .btn-sync { background: var(--accent); color: #fff; border: none; padding: 12px 25px; cursor: pointer; font-weight: 800; font-family: 'DM Mono'; }
  .btn-accent { background: #fff; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: 800; font-family: 'DM Mono'; margin-left: 10px; }
  
  #toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 12px 20px; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 3000; font-size: 12px; }
  #toast.show { opacity: 1; }
  .progress-link { color: #4CAF50; text-decoration: underline; font-weight: 800; cursor: pointer; margin-left: 15px; display: none; font-size: 12px; }
  .margin-info { font-size: 9px; color: #666; margin-top: 4px; font-weight: bold; }
</style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <h3 style="font-family: 'Syne'; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom:10px;">Stock Levels</h3>
  <p style="font-size: 10px; margin: 10px 0 20px; color: #666;">Set physical inventory for each outlet.</p>
  <div id="drawer-content"></div>
  <button class="btn-accent" style="background:#000; color:#fff; width:100%; margin-top:30px; margin-left:0;" onclick="closeDrawer()">CONFIRM STOCK</button>
</div>

<header>
  <img src="Imagine Fashion Logo Transp.png" alt="Imagine Fashion" class="if-logo">
  <div style="text-align: right">
    <p style="font-weight: 800; font-size: 12px; letter-spacing: 2px;">X-SERIES API SYNC</p>
    <p style="font-size: 10px; color: #666;">STINGRAY BUILD v3.2</p>
  </div>
</header>

<div class="container">
  <div id="product-list"></div>
  <button style="width:100%; padding:15px; border:2px dashed #000; background:none; cursor:pointer; margin-bottom:30px; font-family:'DM Mono'; font-weight:700;" onclick="addProduct()">+ ADD NEW PRODUCT LINE</button>

  <div class="export-section">
    <h2 style="font-family:'Syne'; margin-bottom:15px; text-transform: uppercase;">Finalize Import</h2>
    <div style="display:flex; align-items:center;">
      <button class="btn-sync" onclick="syncToLightspeed()">🚀 SYNC TO LIGHTSPEED</button>
      <button class="btn-accent" onclick="exportCSV()">DOWNLOAD CSV</button>
      <a id="view-progress" class="progress-link" target="_blank" href="https://github.com/StingRay1101/lightspeed-importer/actions">VIEW SYNC PROGRESS →</a>
      <div id="counter" style="margin-left:auto; font-weight:700;">0 PRODUCTS</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let products = [];
  let nextId = 1;

  const CATEGORIES = ['', 'Sample Top', 'Sample Pant', 'Sample Dress', 'Sample Skirt', 'Sample Jacket', 'Sample Knit'];

  function addProduct() {
    products.push({ _id: nextId++, open: true, name: '', category: '', supplyPrice: 0, retailPrice: 0, supplierCode: '', stock: { ht: 0, pf: 0, ss: 0, sw: 0 } });
    renderList();
    updateCounter();
  }

  function renderList() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    products.forEach((p, idx) => {
      const total = Object.values(p.stock).reduce((a,b) => a+b, 0);
      const margin = (p.retailPrice > 0) ? (((p.retailPrice - p.supplyPrice) / p.retailPrice) * 100).toFixed(1) : 0;
      
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-pid', p._id);
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(${p._id})">
          <div class="card-num">${idx + 1}</div>
          <div class="card-preview">${p.name || 'NEW PRODUCT'}</div>
          <div class="card-actions">
            <button class="btn-stock" onclick="event.stopPropagation(); openDrawer(${p._id})">STOCK <span class="stock-badge">${total}</span></button>
            <button style="background:none; border:none; cursor:pointer; font-weight:bold; padding:0 10px;" onclick="event.stopPropagation(); removeProduct(${p._id})">✕</button>
          </div>
        </div>
        <div class="card-body ${p.open ? 'open' : ''}">
          <div class="template-bar">
            ${CATEGORIES.filter(c => c).map(c => `<button class="btn-tpl" onclick="applyTpl(${p._id}, '${c}')">${c.replace('Sample ', '')}</button>`).join('')}
          </div>
          <div class="fields-grid">
            <div class="field field-full"><label>Product Name *</label>
                <input type="text" class="req-field" data-field="name" value="${p.name}" oninput="updateField(${p._id},'name',this.value)">
            </div>
            <div class="field"><label>Category *</label>
               <select class="req-field" data-field="category" onchange="updateField(${p._id},'category',this.value)">
                ${CATEGORIES.map(c => `<option value="${c}" ${p.category === c ? 'selected' : ''}>${c || '-- SELECT --'}</option>`).join('')}
               </select>
            </div>
            <div class="field"><label>Supplier Code (SKU)</label>
                <input type="text" value="${p.supplierCode}" oninput="updateField(${p._id},'supplierCode',this.value)">
            </div>
            <div class="field"><label>Cost Price</label>
                <input type="number" step="0.01" value="${p.supplyPrice}" oninput="updateField(${p._id},'supplyPrice',parseFloat(this.value)||0)">
            </div>
            <div class="field"><label>Retail Price *</label>
                <input type="number" step="0.01" class="req-field" data-field="retailPrice" value="${p.retailPrice}" oninput="updateField(${p._id},'retailPrice',parseFloat(this.value)||0)">
                <div class="margin-info">MARGIN: ${margin}%</div>
            </div>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function updateField(id, f, v) { 
    const p = products.find(x => x._id === id); 
    if(p) p[f] = v; 
    if(f === 'name') {
        const preview = document.querySelector(`[data-pid="${id}"] .card-preview`);
        if(preview) preview.innerText = v || 'NEW PRODUCT';
    }
    if(f === 'retailPrice' || f === 'supplyPrice') {
        const card = document.querySelector(`[data-pid="${id}"]`);
        const marginInfo = card.querySelector('.margin-info');
        const margin = (p.retailPrice > 0) ? (((p.retailPrice - p.supplyPrice) / p.retailPrice) * 100).toFixed(1) : 0;
        marginInfo.innerText = `MARGIN: ${margin}%`;
    }
  }
  
  function applyTpl(id, val) { 
    const p = products.find(x => x._id === id); 
    p.name = val; p.category = val; 
    renderList(); 
  }

  function openDrawer(id) {
    const p = products.find(x => x._id === id);
    document.getElementById('drawer-content').innerHTML = `
      <div style="display:flex; flex-direction:column; gap:15px;">
        <div><label>Harbour Town</label><input type="number" value="${p.stock.ht}" oninput="updateStock(${id},'ht',this.value)"></div>
        <div><label>Pacific Fair</label><input type="number" value="${p.stock.pf}" oninput="updateStock(${id},'pf',this.value)"></div>
        <div><label>Southport Showroom</label><input type="number" value="${p.stock.ss}" oninput="updateStock(${id},'ss',this.value)"></div>
        <div><label>Southport Warehouse</label><input type="number" value="${p.stock.sw}" oninput="updateStock(${id},'sw',this.value)"></div>
      </div>`;
    document.getElementById('drawer').classList.add('active');
    document.getElementById('overlay').classList.add('active');
  }

  function updateStock(id, loc, v) { 
    const p = products.find(x => x._id === id); 
    p.stock[loc] = parseInt(v) || 0; 
  }

  function closeDrawer() { 
    document.getElementById('drawer').classList.remove('active'); 
    document.getElementById('overlay').classList.remove('active'); 
    renderList(); 
  }

  function toggleCard(id) { 
    const p = products.find(x => x._id === id);
    if(p) p.open = !p.open; 
    renderList(); 
  }

  function removeProduct(id) { products = products.filter(x => x._id !== id); renderList(); updateCounter(); }
  function updateCounter() { document.getElementById('counter').innerText = `${products.length} PRODUCTS`; }
  function showToast(m) { const t = document.getElementById('toast'); t.innerText = m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 4000); }

  async function syncToLightspeed() {
    // Validation Check
    let hasErrors = false;
    document.querySelectorAll('.req-field').forEach(el => el.classList.remove('invalid'));

    products.forEach(p => {
        if(!p.name || !p.category || !p.retailPrice || p.retailPrice <= 0) {
            hasErrors = true;
            p.open = true; // Open the card to show where the error is
        }
    });

    if (hasErrors) {
        renderList(); // Re-render to show open cards
        document.querySelectorAll('.req-field').forEach(el => {
            if(!el.value || el.value == "0") el.classList.add('invalid');
        });
        showToast("⚠️ Missing required fields (Name, Category, or Price).");
        return;
    }

    let pat = localStorage.getItem('gh_pat');
    if(!pat) {
        pat = prompt("🔑 ENTER GITHUB PERSONAL ACCESS TOKEN (One time only):");
        if(pat) localStorage.setItem('gh_pat', pat);
        else return;
    }
    
    const repoOwner = "StingRay1101"; 
    const repoName = "lightspeed-importer";

    showToast("📤 Sending to GitHub...");

    try {
        const response = await fetch(`https://api.github.com/repos/${repoOwner}/${repoName}/dispatches`, {
          method: 'POST',
          headers: { 
              'Authorization': `token ${pat}`, 
              'Accept': 'application/vnd.github.v3+json',
              'Content-Type': 'application/json'
          },
          body: JSON.stringify({ event_type: 'create_products', client_payload: { products: products } })
        });

        if(response.ok) {
            showToast("✅ SYNC STARTED! Check the progress link.");
            document.getElementById('view-progress').style.display = 'inline-block';
        } else {
            showToast("❌ Error: Check your GitHub Token & Repo Name.");
            localStorage.removeItem('gh_pat'); 
        }
    } catch (e) {
        showToast("❌ Network Error.");
    }
  }

  function exportCSV() { 
      showToast("CSV generation placeholder."); 
  }

  addProduct();
</script>
</body>
</html>
