<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imagine Fashion | Direct X-Series Sync</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root { --bg: #FAFAFA; --surface: #ffffff; --border: #000000; --text: #1a1a1a; --accent: #4CAF50; --radius: 2px; --error: #ff4d4d; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; padding: 40px 20px; }
  header { max-width: 850px; margin: 0 auto 40px; display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid var(--text); padding-bottom: 20px; }
  .if-logo { height: 65px; width: auto; }
  .container { max-width: 850px; margin: 0 auto; }
  
  .template-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
  .btn-temp { background: #eee; border: 1px solid #000; padding: 6px 12px; font-size: 11px; font-weight: 700; cursor: pointer; font-family: 'DM Mono'; }
  
  #product-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }
  .product-card { background: var(--surface); border: 1px solid #ccc; border-radius: var(--radius); overflow: hidden; }
  .card-header { display: flex; align-items: center; padding: 15px; cursor: pointer; background: #fff; }
  .card-num { background: #000; color: #fff; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: 800; margin-right: 15px; }
  .card-preview { flex: 1; font-weight: 600; font-size: 14px; text-transform: uppercase; }
  
  .card-actions { display: flex; gap: 8px; }
  .btn-ui { background: #fff; border: 1px solid #000; padding: 5px 10px; font-size: 10px; cursor: pointer; font-weight: 700; }
  .btn-black { background: #000; color: #fff; border: none; padding: 6px 12px; font-size: 10px; cursor: pointer; font-weight: 700; }

  .card-body { display: none; padding: 20px; border-top: 1px solid #eee; background: #fafafa; }
  .card-body.open { display: block; }
  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .field-full { grid-column: 1 / -1; }
  label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }
  input, select { border: 1px solid #000; padding: 10px; width: 100%; font-family: 'DM Mono'; font-size: 13px; }
  
  .config-panel { background: #f0f0f0; border: 1px solid #000; padding: 20px; margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .export-section { background: #000; color: #fff; padding: 25px; border-radius: 4px; }
  .btn-sync { background: var(--accent); color: #fff; border: none; padding: 12px 25px; cursor: pointer; font-weight: 800; font-family: 'DM Mono'; font-size: 16px; }
  
  .drawer { position: fixed; top: 0; right: -450px; width: 380px; height: 100%; background: #fff; border-left: 2px solid #000; transition: 0.4s; z-index: 2000; padding: 40px 30px; }
  .drawer.active { right: 0; }
  .drawer-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); display: none; z-index: 1999; }
  .drawer-overlay.active { display: block; }
  #toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff; padding: 12px 20px; border-radius: 4px; opacity: 0; transition: 0.3s; z-index: 3000; font-size: 12px; }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<div class="drawer-overlay" id="overlay" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <h3 style="font-family: 'Syne'; text-transform: uppercase; border-bottom: 2px solid #000; padding-bottom:10px;">Stock Levels</h3>
  <div id="drawer-content" style="margin-top:20px;"></div>
  <button class="btn-black" style="width:100%; margin-top:30px; padding:15px;" onclick="closeDrawer()">SAVE & CLOSE</button>
</div>

<header>
  <img src="Imagine Fashion Logo Transp.png" alt="Imagine Fashion" class="if-logo">
  <div style="text-align: right">
    <p style="font-weight: 800; font-size: 12px;">DIRECT API v4.0</p>
    <p style="font-size: 10px; color: #666;">BYPASSING GITHUB ACTIONS</p>
  </div>
</header>

<div class="container">
  <div class="config-panel">
    <div class="field-full"><label>Permanent Access Token</label><input type="password" id="api_token" placeholder="Bearer Token..."></div>
    <div><label>Lightspeed Domain</label><input type="text" id="api_domain" placeholder="yourstorename"></div>
    <div><label>Status</label><div id="api_status" style="font-size:11px; margin-top:10px; font-weight:700; color:orange;">WAITING FOR INPUT</div></div>
  </div>

  <label>Quick Templates:</label>
  <div class="template-bar" id="templates"></div>

  <div id="product-list"></div>
  
  <div style="display:flex; gap:10px; margin-bottom:30px;">
    <button style="flex:3; padding:15px; border:2px dashed #000; background:none; cursor:pointer; font-weight:700;" onclick="addProduct()">+ ADD NEW PRODUCT</button>
    <button style="flex:1; padding:15px; border:1px solid #ff4d4d; color:#ff4d4d; background:none; cursor:pointer; font-weight:700;" onclick="clearAll()">CLEAR ALL</button>
  </div>

  <div class="export-section">
    <h2 style="font-family:'Syne'; margin-bottom:15px; text-transform: uppercase;">Sync Directly</h2>
    <div style="display:flex; align-items:center;">
      <button class="btn-sync" id="sync_btn" onclick="startDirectSync()">🚀 SYNC TO LIGHTSPEED</button>
      <div id="counter" style="margin-left:auto; font-weight:700;">0 PRODUCTS</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let products = [];
  let nextId = 1;

  const CATEGORIES = ['Sample Top', 'Sample Pant', 'Sample Dress', 'Sample Skirt', 'Sample Jacket', 'Sample Knit', 'Sample Accessory', 'Sample Belt', 'Sample Jewellery', 'Sample Scarf', 'Sample Shoes', 'Sample Shorts', 'Sample Vest'];
  const BRANDS = ['Imagine Fashion', 'Accessories', 'All Season', 'Belts', 'Discontinued', 'Ex Display', 'Final Clearance', 'Freight', 'Gift Card', 'Imagine Fashion Dev 1', 'Imagine Fashion Wholesale', 'Jewellery', 'Needs Altering', 'Not specified', 'Summer 20-21', 'Summer 21-22', 'Summer 22-23', 'Summer 23-24', 'Summer 24-25', 'Summer 25-26', 'Summer 25-27', 'Summer 25-28', 'Summer Discontinued', 'Winter 2021', 'Winter 2022', 'Winter 2023', 'Winter 2024', 'Winter 2025', 'Winter 2026', 'Wrapped Gift Cards'];
  
  // These should be your Outlet IDs from Lightspeed
  const OUTLET_IDS = { ht: 'YOUR_HT_ID', pf: 'YOUR_PF_ID', ss: 'YOUR_SS_ID', sw: 'YOUR_SW_ID' };

  // Setup Templates
  CATEGORIES.forEach(cat => {
    const btn = document.createElement('button');
    btn.className = 'btn-temp';
    btn.innerText = `+ ${cat.replace('Sample ', '')}`;
    btn.onclick = () => addProduct(cat);
    document.getElementById('templates').appendChild(btn);
  });

  function addProduct(cat = '') {
    products.push({ _id: nextId++, open: true, name: '', category: cat, brand: 'Imagine Fashion', supplyPrice: 0, retailPrice: 0, sku: '', stock: { ht: 0, pf: 0, ss: 0, sw: 0 } });
    renderList();
    updateCounter();
  }

  function renderList() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    products.forEach((p, idx) => {
      const total = Object.values(p.stock).reduce((a,b) => a+b, 0);
      const card = document.createElement('div');
      card.className = 'product-card';
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(${p._id})">
          <div class="card-num">${idx + 1}</div>
          <div class="card-preview">${p.name || 'NEW PRODUCT'}</div>
          <div class="card-actions">
            <button class="btn-ui" onclick="event.stopPropagation(); duplicate(${p._id})">DUP</button>
            <button class="btn-black" onclick="event.stopPropagation(); openDrawer(${p._id})">STOCK [${total}]</button>
            <button class="btn-ui" style="color:red" onclick="event.stopPropagation(); remove(${p._id})">✕</button>
          </div>
        </div>
        <div class="card-body ${p.open ? 'open' : ''}">
          <div class="fields-grid">
            <div class="field-full"><label>Product Name</label><input type="text" value="${p.name}" oninput="update(${p._id},'name',this.value)"></div>
            <div><label>Category</label><select onchange="update(${p._id},'category',this.value)">
                <option value="">-- SELECT --</option>
                ${CATEGORIES.map(c => `<option value="${c}" ${p.category===c?'selected':''}>${c}</option>`).join('')}
            </select></div>
            <div><label>Brand</label><select onchange="update(${p._id},'brand',this.value)">
                ${BRANDS.map(b => `<option value="${b}" ${p.brand===b?'selected':''}>${b}</option>`).join('')}
            </select></div>
            <div><label>SKU (Leave blank for Auto)</label><input type="text" value="${p.sku}" oninput="update(${p._id},'sku',this.value)"></div>
            <div><label>Cost</label><input type="number" value="${p.supplyPrice}" oninput="update(${p._id},'supplyPrice',this.value)"></div>
            <div><label>Retail Price</label><input type="number" value="${p.retailPrice}" oninput="update(${p._id},'retailPrice',this.value)"></div>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function update(id, f, v) { products.find(x=>x._id===id)[f]=v; if(f==='name') renderList(); }
  function toggleCard(id) { let p=products.find(x=>x._id===id); p.open=!p.open; renderList(); }
  function remove(id) { products=products.filter(x=>x._id!==id); renderList(); updateCounter(); }
  function duplicate(id) { let p=products.find(x=>x._id===id); let copy=JSON.parse(JSON.stringify(p)); copy._id=nextId++; products.push(copy); renderList(); updateCounter(); }
  function updateCounter() { document.getElementById('counter').innerText = `${products.length} PRODUCTS`; }
  function clearAll() { if(confirm("Clear everything?")) { products=[]; renderList(); updateCounter(); } }
  function showToast(m) { const t=document.getElementById('toast'); t.innerText=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 3000); }

  function openDrawer(id) {
    const p = products.find(x => x._id === id);
    document.getElementById('drawer-content').innerHTML = `
      <div style="display:flex; flex-direction:column; gap:15px;">
        <div><label>Harbour Town</label><input type="number" value="${p.stock.ht}" oninput="products.find(x=>x._id===${id}).stock.ht=parseInt(this.value)"></div>
        <div><label>Pacific Fair</label><input type="number" value="${p.stock.pf}" oninput="products.find(x=>x._id===${id}).stock.pf=parseInt(this.value)"></div>
        <div><label>Southport Showroom</label><input type="number" value="${p.stock.ss}" oninput="products.find(x=>x._id===${id}).stock.ss=parseInt(this.value)"></div>
        <div><label>Southport Warehouse</label><input type="number" value="${p.stock.sw}" oninput="products.find(x=>x._id===${id}).stock.sw=parseInt(this.value)"></div>
      </div>`;
    document.getElementById('drawer').classList.add('active');
    document.getElementById('overlay').classList.add('active');
  }
  function closeDrawer() { document.getElementById('drawer').classList.remove('active'); document.getElementById('overlay').classList.remove('active'); renderList(); }

  // THE SYNC LOGIC
  async function startDirectSync() {
    const token = document.getElementById('api_token').value;
    const domain = document.getElementById('api_domain').value;
    if(!token || !domain) { alert("Please enter API Token and Domain."); return; }

    document.getElementById('sync_btn').innerText = "⏳ SYNCING...";
    document.getElementById('sync_btn').disabled = true;

    for (let p of products) {
        try {
            const finalName = `${p.name} #${Math.floor(1000 + Math.random() * 9000)}`;
            const finalSku = p.sku || `IF-${Date.now()}`;

            // 1. Create Product
            const res = await fetch(`https://${domain}.retail.lightspeed.app/api/2.0/products`, {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    name: finalName,
                    sku: finalSku,
                    supply_price: parseFloat(p.supplyPrice) || 0,
                    retail_price: parseFloat(p.retailPrice) || 0,
                    type: p.category,
                    brand_name: p.brand
                })
            });

            const data = await res.json();
            // Handle if data is array or object
            const product_id = data.data && Array.isArray(data.data) ? data.data[0].id : (data.data ? data.data.id : null);

            if (product_id) {
                // 2. Update Inventory
                await fetch(`https://${domain}.retail.lightspeed.app/api/2.0/inventory`, {
                    method: 'POST',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify([
                        { product_id, outlet_id: OUTLET_IDS.ht, count: p.stock.ht },
                        { product_id, outlet_id: OUTLET_IDS.pf, count: p.stock.pf },
                        { product_id, outlet_id: OUTLET_IDS.ss, count: p.stock.ss },
                        { product_id, outlet_id: OUTLET_IDS.sw, count: p.stock.sw }
                    ])
                });
                console.log(`Synced ${finalName}`);
            } else {
                console.error("Failed to get ID", data);
            }
        } catch (err) {
            console.error("Sync Error", err);
        }
    }

    document.getElementById('sync_btn').innerText = "🚀 SYNC COMPLETE";
    showToast("All products synced directly to X-Series.");
    setTimeout(() => { 
        document.getElementById('sync_btn').innerText = "🚀 SYNC TO LIGHTSPEED";
        document.getElementById('sync_btn').disabled = false;
    }, 3000);
  }

  addProduct();
</script>
</body>
</html>
