<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightspeed Product Importer</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Cormorant+Garamond:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAFAFA;
    --surface: #ffffff;
    --border: #000000;
    --text: #1a1a1a;
    --accent: #b07878;
    --radius: 2px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    padding: 40px 20px;
  }

  header {
    max-width: 820px;
    margin: 0 auto 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--text);
    padding-bottom: 20px;
  }

  .if-logo { height: 65px; width: auto; }

  .container { max-width: 820px; margin: 0 auto; }

  #product-list { display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

  .product-card {
    background: var(--surface);
    border: 1px solid #ccc;
    border-radius: var(--radius);
  }

  .card-header {
    display: flex;
    align-items: center;
    padding: 15px;
    cursor: pointer;
  }

  .card-num {
    background: #000; color: #fff;
    width: 24px; height: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 10px; font-weight: 800; margin-right: 15px;
  }

  .card-preview { flex: 1; font-weight: 600; font-size: 14px; }
  .card-preview.empty { color: #aaa; font-style: italic; }

  @keyframes flash-red-field {
    0% { border-color: #ff0000; background: #fff; }
    50% { border-color: #ff0000; background: #ffebeb; }
    100% { border-color: #000; background: #fff; }
  }
  .flash-red { animation: flash-red-field 0.7s ease 3; border-width: 2px !important; }

  .card-duplicate {
    background: #f0f7ff; border: 1px solid #bcd8f5; color: #0056b3;
    padding: 5px 10px; font-size: 10px; cursor: pointer; font-weight: 700; text-transform: uppercase;
  }

  .card-remove {
    background: #fff0f0; border: 1px solid #f5c6c6; color: #b30000;
    padding: 5px 10px; cursor: pointer; margin-left: 8px;
  }

  .card-body { display: none; padding: 20px; border-top: 1px solid #eee; background: #fff; }
  .card-body.open { display: block; }

  .fields-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
  .field-full { grid-column: 1 / -1; }

  label { font-size: 10px; font-weight: 800; text-transform: uppercase; margin-bottom: 5px; display: block; }

  input, select {
    border: 1px solid #000; border-radius: 0;
    padding: 10px; width: 100%; font-family: 'DM Mono'; font-size: 13px;
  }

  .add-btn {
    width: 100%; background: #fff; border: 2px dashed #000; padding: 15px;
    font-weight: 700; cursor: pointer; margin-bottom: 30px; font-family: 'DM Mono';
  }

  .export-section { background: #000; color: #fff; padding: 25px; border-radius: 4px; }
  .btn-accent { background: #fff; color: #000; border: none; padding: 12px 25px; cursor: pointer; font-weight: 800; font-family: 'DM Mono'; }
  .btn-ghost { background: transparent; border: 1px solid #fff; color: #fff; padding: 12px 25px; margin-left: 10px; cursor: pointer; font-family: 'DM Mono'; }

  #toast {
    position: fixed; bottom: 20px; right: 20px; background: #333; color: #fff;
    padding: 12px 20px; border-radius: 4px; opacity: 0; transition: 0.3s;
  }
  #toast.show { opacity: 1; }
</style>
</head>
<body>

<header>
  <img src="Imagine Fashion Logo Transp.png" alt="Imagine Fashion" class="if-logo">
  <div style="text-align: right">
    <p style="font-weight: 800; font-size: 12px; letter-spacing: 2px;">PRODUCT IMPORTER</p>
    <p style="font-size: 10px; color: #666;">LIGHTSPEED V1.6</p>
  </div>
</header>

<div class="container">
  <div id="product-list"></div>
  <button class="add-btn" onclick="addProduct()">+ ADD NEW PRODUCT LINE</button>

  <div class="export-section">
    <h2 style="margin-bottom: 10px; font-family: 'Syne'; text-transform: uppercase;">Finalize Export</h2>
    <div style="display: flex; align-items: center;">
      <button class="btn-accent" onclick="exportCSV()">DOWNLOAD CSV</button>
      <button class="btn-ghost" onclick="clearAll()">CLEAR ALL</button>
      <div id="counter" style="margin-left: auto; font-weight: 700;">0 PRODUCTS</div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  let products = [];
  let nextId = 1;

  const CATEGORIES = ['', 'Sample Top', 'Sample Pant', 'Sample Dress', 'Sample Skirt', 'Sample Jacket', 'Sample Knit', 'Jewellery', 'Accessories', 'Homewares', 'Belts', 'Bags', 'Scarves'];
  
  const BRANDS = [
    '', 'Accessories', 'All Season', 'Belts', 'Discontinued', 'Ex Display', 
    'Final Clearance', 'Freight', 'Gift Card', 'Imagine Fashion', 
    'Imagine Fashion Dev 1', 'Imagine Fashion Wholesale', 'Jewellery', 
    'Needs Altering', 'Not specified', 'Summer 20-21', 'Summer 21-22', 
    'Summer 22-23', 'Summer 23-24', 'Summer 24-25', 'Summer 25-26', 
    'Summer 25-27', 'Summer 25-28', 'Summer Discontinued', 'Winter 2021', 
    'Winter 2022', 'Winter 2023', 'Winter 2024', 'Winter 2025', 
    'Winter 2026', 'Wrapped Gift Cards'
  ];

  function uid() { return Math.random().toString(36).slice(2, 10).toUpperCase(); }
  function genCode() { return Math.floor(Math.random() * 900) + 100; }
  function slugify(str) { return (str || 'product').toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '') || 'product'; }
  function showToast(msg) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2500); }

  function addProduct(data = null) {
    const p = {
      _id: nextId++,
      open: true,
      name: '',
      category: data ? data.category : '',
      retailPrice: data ? data.retailPrice : '',
      brandName: data ? data.brandName : '',
      supplierCode: data ? data.supplierCode : '',
    };
    products.push(p);
    renderList();
    document.getElementById('counter').innerHTML = `${products.length} PRODUCTS`;

    if (data) {
      setTimeout(() => {
        const input = document.querySelector(`[data-pid="${p._id}"] .name-input`);
        input.classList.add('flash-red');
        input.focus();
      }, 50);
    }
  }

  function duplicateProduct(id) {
    const p = products.find(p => p._id === id);
    if (p) { addProduct({...p}); showToast("CLONED DATA"); }
  }

  function removeProduct(id) {
    products = products.filter(p => p._id !== id);
    renderList();
    document.getElementById('counter').innerHTML = `${products.length} PRODUCTS`;
  }

  function toggleCard(id) {
    const p = products.find(p => p._id === id);
    if (p) { p.open = !p.open; renderList(); }
  }

  function updateField(id, field, value) {
    const p = products.find(p => p._id === id);
    if (p) {
      p[field] = value;
      const card = document.querySelector(`[data-pid="${id}"]`);
      if (card) {
        card.querySelector('.card-preview').textContent = p.name || 'UNTITLED PRODUCT';
        card.querySelector('.card-preview').classList.toggle('empty', !p.name);
      }
    }
  }

  function renderList() {
    const list = document.getElementById('product-list');
    list.innerHTML = '';
    products.forEach((p, idx) => {
      const card = document.createElement('div');
      card.className = 'product-card';
      card.setAttribute('data-pid', p._id);
      card.innerHTML = `
        <div class="card-header" onclick="toggleCard(${p._id})">
          <div class="card-num">${idx + 1}</div>
          <div class="card-preview ${!p.name ? 'empty' : ''}">${p.name || 'UNTITLED PRODUCT'}</div>
          <button class="card-duplicate" onclick="event.stopPropagation(); duplicateProduct(${p._id})">DUPLICATE</button>
          <button class="card-remove" onclick="event.stopPropagation(); removeProduct(${p._id})">✕</button>
        </div>
        <div class="card-body ${p.open ? 'open' : ''}">
          <div class="fields-grid">
            <div class="field field-full">
              <label>Product Name *</label>
              <input type="text" class="name-input" value="${p.name}" oninput="updateField(${p._id},'name',this.value)">
            </div>
            <div class="field">
              <label>Category *</label>
              <select onchange="updateField(${p._id},'category',this.value)">
                ${CATEGORIES.map(c => `<option value="${c}" ${p.category === c ? 'selected' : ''}>${c || '-- SELECT --'}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Retail Price *</label>
              <input type="number" step="0.01" value="${p.retailPrice}" oninput="updateField(${p._id},'retailPrice',this.value)">
            </div>
            <div class="field">
              <label>Brand</label>
              <select onchange="updateField(${p._id},'brandName',this.value)">
                ${BRANDS.map(b => `<option value="${b}" ${p.brandName === b ? 'selected' : ''}>${b || '-- SELECT --'}</option>`).join('')}
              </select>
            </div>
            <div class="field">
              <label>Supplier Code</label>
              <input type="text" value="${p.supplierCode}" oninput="updateField(${p._id},'supplierCode',this.value)">
            </div>
          </div>
        </div>
      `;
      list.appendChild(card);
    });
  }

  function exportCSV() {
    const invalid = products.filter(p => !p.name || !p.retailPrice || !p.category);
    if (invalid.length > 0) {
      showToast("MISSING REQUIRED FIELDS");
      invalid.forEach(p => {
        const el = document.querySelector(`[data-pid="${p._id}"] .name-input`);
        if(el) el.classList.add('flash-red');
      });
      return;
    }

    const headers = ['handle','sku','name','product_category','retail_price','tax_name','brand_name','supplier_code','active','track_inventory','inventory_Harbour_Town','inventory_Pacific_Fair','inventory_Southport_Showroom','inventory_Southport_Warehouse'];

    const rows = products.map(p => {
      const code = genCode();
      const fullName = `${p.name} - ${code}`;
      return [
        slugify(fullName),
        uid(), 
        fullName,
        p.category,
        p.retailPrice,
        'GST',
        p.brandName || '',
        p.supplierCode || '',
        1, 
        1, 
        0, 0, 0, 0 
      ];
    });

    const csv = [headers, ...rows].map(row => row.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = `IMAGINE-IMPORT-${Date.now()}.csv`; a.click();
    showToast("EXPORTED TO DOWNLOADS");
  }

  function clearAll() { if(confirm("CLEAR ALL ENTRIES?")) { products = []; renderList(); document.getElementById('counter').innerHTML = "0 PRODUCTS"; } }

  addProduct();
</script>
</body>
</html>
