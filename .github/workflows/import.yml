name: Lightspeed X-Series Import

on:
  repository_dispatch:
    types: [create_products]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Post to X-Series API
        env:
          TOKEN: ${{ secrets.X_SERIES_TOKEN }}
          DOMAIN: ${{ secrets.X_SERIES_DOMAIN }}
          PAYLOAD: ${{ toJson(github.event.client_payload.products) }}
        run: |
          echo "Starting import for $(echo $PAYLOAD | jq 'length') products..."
          
          echo "$PAYLOAD" | jq -c '.[]' | while read -r item; do
            NAME=$(echo $item | jq -r .name)
            RETAIL=$(echo $item | jq -r .retailPrice)
            SUPPLY=$(echo $item | jq -r .supplyPrice)
            CAT=$(echo $item | jq -r .category)
            
            # Grab SKU and Strip Spaces
            RAW_SKU=$(echo $item | jq -r .supplierCode)
            SKU=$(echo $RAW_SKU | sed 's/ /-/g')
            
            if [ "$SKU" == "null" ] || [ "$SKU" == "" ]; then
              SKU="IF-$(date +%s%N | cut -b10-15)"
            fi

            echo "Syncing: $NAME (SKU: $SKU) as Category: $CAT"

            # FIX: Use "type" for Category and add "Imagine Fashion" as a Tag
            curl -s -X POST "https://$DOMAIN.retail.lightspeed.app/api/2.0/products" \
              -H "Authorization: Bearer $TOKEN" \
              -H "Content-Type: application/json" \
              -d "{
                \"name\": \"$NAME\",
                \"sku\": \"$SKU\",
                \"supply_price\": ${SUPPLY:-0},
                \"retail_price\": ${RETAIL:-0},
                \"type\": \"$CAT\",
                \"tags\": \"Imagine Fashion\"
              }"
          done
